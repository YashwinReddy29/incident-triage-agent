version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: incident_triage
      POSTGRES_USER: ituser
      POSTGRES_PASSWORD: itpassword
    ports:
      - "5440:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ituser -d incident_triage"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: